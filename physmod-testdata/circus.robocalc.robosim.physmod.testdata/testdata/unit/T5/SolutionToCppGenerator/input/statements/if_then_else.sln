Solution if_then_else {
    state {
        x: int = 10;
        y: int = 20;
        result: int = 0;
        flag: bool = true;
    }
    computation {
        {
            if (x > y) {
                result = x - y;
            } else {
                result = y - x;
            }
        }
        {
            if (flag == true) {
                x = x * 2;
                y = y * 2;
            }
        }
        {
            if (result <= 0) {
                result = 1;
            } else {
                if (result > 100) {
                    result = 100;
                }
            }
        }
    }
}
