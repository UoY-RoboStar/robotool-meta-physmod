        // B_k[n-1] remains unchanged (base frame)
        T_from_X(X_T[1], T_XT);
        T_from_X(X_J[1], T_XJ);
        B_k[1] = B_k[2] * T_XT * T_XJ;
        T_from_X(X_T[0], T_XT);
        T_from_X(X_J[0], T_XJ);
        B_k[0] = B_k[1] * T_XT * T_XJ;
