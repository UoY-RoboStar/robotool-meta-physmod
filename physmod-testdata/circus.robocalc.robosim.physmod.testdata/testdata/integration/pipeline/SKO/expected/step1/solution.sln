        procedure CalcPhi_proc(val i: int, val j: int, val B_k: seq(mat(4,4)), val-res result: mat(6,6)) {
        		    R_i: mat(3,3) = submatrix(B_k[i - 1])(0, 0, 3, 3);
        		    R_j: mat(3,3) = submatrix(B_k[j - 1])(0, 0, 3, 3);
        		    R_ij: mat(3,3) = adjoint(R_i) * R_j;
