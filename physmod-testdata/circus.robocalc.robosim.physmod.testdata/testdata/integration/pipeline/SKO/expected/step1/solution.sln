        procedure T_from_X(val X: mat(6,6), res result: mat(4,4)) {
        			R: mat(3,3);
        			BL: mat(3,3);
        			S: mat(3,3);
        			p: vec(3);
        
        			// R = X[0:3,0:3]
        			for (i: int in range(0, 3, 1)) {
        				for (j: int in range(0, 3, 1)) {
        					R[i,j] = X[i,j];
        				}
        			}
        
        			// BL = X[3:6,0:3]
        			for (i: int in range(0, 3, 1)) {
        				for (j: int in range(0, 3, 1)) {
        					BL[i,j] = X[i+3,j];
        				}
        			}
        
        			// S = BL * R^T -> S = skew(p)
        			for (i: int in range(0, 3, 1)) {
        				for (j: int in range(0, 3, 1)) {
        					S[i,j] = 0;
        					for (k: int in range(0, 3, 1)) {
        						S[i,j] = S[i,j] + BL[i,k] * R[j,k];
        					}
        				}
        			}
        
        			// p from S = skew(p)
        			p[0] = S[2,1];
        			p[1] = S[0,2];
        			p[2] = S[1,0];
        
        			// Build 4x4 homogeneous transform [R|p; 0|1]
        			for (i: int in range(0, 3, 1)) {
        				for (j: int in range(0, 3, 1)) {
        					result[i,j] = R[i,j];
        				}
        			}
        			for (i: int in range(0, 3, 1)) {
        				result[i,3] = p[i];
        			}
        			result[3,0] = 0;
        			result[3,1] = 0;
        			result[3,2] = 0;
        			result[3,3] = 1;
        		}
